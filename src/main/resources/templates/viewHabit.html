<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Habit Details</title>

    <style>

        /* ===== GLOBAL ===== */

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Inter,system-ui,sans-serif;
        }

        body{
        display:flex;
        flex-direction:column;
        min-height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:#333;
        transition:.3s;
        }

        /* ===== DARK MODE ===== */

        body.dark-mode{
        background:#1e1e2f;
        color:#f0f0f0;
        }

        body.dark-mode .navbar,
        body.dark-mode .footer{
        background:#2c2c3f;
        color:#f0f0f0;
        }

        body.dark-mode .card{
        background:#2c2c3f;
        color:#f0f0f0;
        }

        body.dark-mode .info-box{
        background:#3b3b4f;
        }

        /* ===== NAVBAR ===== */

        .navbar{
        height:56px;
        background:rgba(255,255,255,.95);
        padding:0 24px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        box-shadow:0 8px 24px rgba(0,0,0,.1);
        }

        .nav-left,
        .nav-center,
        .nav-right{
        display:flex;
        align-items:center;
        gap:18px;
        }

        .logo{
        font-size:20px;
        font-weight:700;
        color:#667eea;
        }

        .nav-left a,
        .nav-right a{
        text-decoration:none;
        font-size:14px;
        color:#555;
        font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
        color:#667eea;
        }

        .nav-left a.active{
        color:#667eea;
        font-weight:600;
        }

        .table-icon{
        font-size:18px;
        background:#667eea;
        color:white;
        padding:6px 12px;
        border-radius:8px;
        text-decoration:none;
        }

        .profile-circle{
        width:36px;
        height:36px;
        border-radius:50%;
        overflow:hidden;
        border:2px solid #667eea;
        cursor:pointer;
        }

        .profile-circle img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        }

        .logout-btn{
        font-size:14px;
        font-weight:500;
        color:#555;
        padding:6px 12px;
        border-radius:8px;
        background:#f5f5f5;
        border:1px solid #ddd;
        cursor:pointer;
        }

        .logout-btn:hover{
        background:#667eea;
        color:white;
        border-color:#667eea;
        }

        /* ===== PAGE WRAPPER ===== */

        .page-wrapper{
        flex:1;
        display:flex;
        justify-content:center;
        padding:30px 20px;
        }

        /* ===== CARD ===== */

        .card{
        background:white;
        border-radius:18px;
        padding:22px;
        box-shadow:0 14px 30px rgba(0,0,0,.15);
        width:100%;
        max-width:950px;
        }

        .habit-title{
        text-align:center;
        margin-bottom:20px;
        }

        .habit-title h2{
        font-size:26px;
        color:#667eea;
        }

        .habit-title span{
        font-size:14px;
        color:#777;
        }

        /* ===== GRID ===== */

        .info-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
        margin-top:15px;
        }

        .info-box{
        background:#f4f6ff;
        padding:10px;
        border-radius:12px;
        }

        .label{
        font-size:12px;
        color:#555;
        }

        .value{
        font-size:14px;
        font-weight:600;
        }

        /* ===== STATUS ===== */

        .status{
        text-align:center;
        margin-top:20px;
        }

        .status span{
        padding:6px 14px;
        border-radius:20px;
        background:linear-gradient(135deg,#43cea2,#185a9d);
        color:white;
        font-weight:600;
        }

        /* ===== PURPOSE ===== */

        .purpose-box{
        margin-top:16px;
        padding:12px;
        border-radius:12px;
        background:#fff3cd;
        color:#856404;
        }

        /* ===== BACK BUTTON ===== */

        .back-btn{
        display:inline-block;
        margin-top:18px;
        padding:8px 16px;
        background:#667eea;
        color:white;
        border-radius:10px;
        text-decoration:none;
        }

        .back-btn:hover{
        background:#4b5bdc;
        }

        /* ===== FOOTER ===== */

        .footer{
        height:48px;
        background:rgba(255,255,255,.95);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        color:#555;
        box-shadow:0 -4px 16px rgba(0,0,0,.1);
        }

    </style>
</head>

<body>

<header class="navbar">

    <div class="nav-left">
        <div class="logo">HabitIQ</div>

        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}" class="active">Habits</a>
        <a th:href="@{/api/v1/settings}" class="table-icon">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">

        <button id="darkToggle" style="border:none;background:none;font-size:18px;cursor:pointer;">🌙</button>

        <a th:href="@{/api/v1/progress}">Progress</a>

        <a th:href="@{/api/v1/profile}" class="profile-circle">
            <img th:if="${profile != null and profile.profileImage != null}" th:src="@{/api/v1/profile/image}">
            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">👤</span>
        </a>

        <form th:action="@{/api/v1/auth/logout}" method="get">
            <button type="submit" class="logout-btn">Logout</button>
        </form>

    </div>

</header>

<main class="page-wrapper">

    <section class="card">

        <div class="habit-title">
            <h2 th:text="${habit.habitName}"></h2>
            <span>✨ Build consistency, one step at a time</span>
        </div>

        <div class="info-grid">

            <div class="info-box">
                <div class="label">📂 Category</div>
                <div class="value" th:text="${habit.categoryEnum}"></div>
            </div>

            <div class="info-box">
                <div class="label">🔁 Frequency</div>
                <div class="value" th:text="${habit.frequencyEnum}"></div>
            </div>

            <div class="info-box">
                <div class="label">⏰ Preferred Time</div>
                <div class="value" th:text="${habit.preferredTimeOfDayEnum}"></div>
            </div>

            <div class="info-box">
                <div class="label">⚡ Effort Level</div>
                <div class="value" th:text="${habit.effortLevelEnum}"></div>
            </div>

            <div class="info-box">
                <div class="label">🔥 Current Streak</div>
                <div class="value" th:text="${habit.currentStreak} + ' days'"></div>
            </div>

            <div class="info-box">
                <div class="label">🏆 Longest Streak</div>
                <div class="value" th:text="${habit.longestStreak} + ' days'"></div>
            </div>

        </div>

        <div class="status">
            <span th:text="'🔥 Status: ' + ${habit.statusEnum}"></span>
        </div>

        <div class="purpose-box">
            <strong>💡 Purpose</strong>
            <p th:text="${habit.purpose}"></p>
        </div>

        <div class="info-box" style="margin-top:12px;">
            <div class="label">📅 Created At</div>
            <div class="value" th:text="${habit.createdAt}"></div>
        </div>

        <a th:href="@{/api/v1/habits/dashboard}" class="back-btn">⬅ Back to Dashboard</a>

    </section>

</main>

<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<script>

    const toggle=document.getElementById("darkToggle");

    if(localStorage.getItem("darkMode")==="enabled"){
    document.body.classList.add("dark-mode");
    toggle.textContent="☀️";
    }

    toggle.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
    localStorage.setItem("darkMode","enabled");
    toggle.textContent="☀️";
    }else{
    localStorage.setItem("darkMode","disabled");
    toggle.textContent="🌙";
    }

    });

</script>

</body>
</html>
