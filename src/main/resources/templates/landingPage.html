<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Create Habit</title>

    <style>

        /* ===== GLOBAL ===== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,system-ui,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }

        /* ===== NAVBAR ===== */
        .navbar{
            height:56px;
            background:rgba(255,255,255,.95);
            padding:0 24px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            box-shadow:0 8px 24px rgba(0,0,0,.1);
        }

        .logo{
            font-size:20px;
            font-weight:700;
            color:#667eea;
        }

        .nav-left,
        .nav-center,
        .nav-right{
            display:flex;
            align-items:center;
            gap:18px;
        }

        .nav-left a,
        .nav-right a{
            text-decoration:none;
            color:#555;
            font-size:14px;
            font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
            color:#667eea;
        }

        .nav-left a.active{
            color:#667eea;
            font-weight:600;
        }

        .table-icon{
            font-size:18px;
            background:#667eea;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            text-decoration:none;
        }

        .table-icon:hover{
            transform:scale(1.1);
            transition:0.2s;
        }

        /* ===== PROFILE CIRCLE ===== */
        .profile-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #667eea;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== ONBOARDING ===== */
        .onboarding-wrapper{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:#fff;
            width:420px;
            padding:30px;
            border-radius:18px;
            box-shadow:0 25px 60px rgba(0,0,0,.25);
        }

        .progress-bar{
            height:6px;
            background:linear-gradient(to right,#667eea,#764ba2);
            border-radius:10px;
            margin-bottom:8px;
        }

        #stepText{
            font-size:12px;
            color:#777;
        }

        .screen{
            display:none;
        }

        .screen.active{
            display:block;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:14px;
            margin-bottom:20px;
        }

        .grid.single{
            grid-template-columns:1fr;
        }

        .card{
            padding:16px;
            border-radius:12px;
            border:2px solid #eee;
            text-align:center;
            cursor:pointer;
        }

        .card.selected{
            background:#667eea;
            color:white;
            border-color:#667eea;
        }

        input,textarea{
            width:100%;
            padding:10px;
            margin-bottom:16px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:22px;
            background:linear-gradient(to right,#667eea,#764ba2);
            color:white;
            font-size:14px;
            cursor:pointer;
        }
.logout-btn {
    font-size:14px;
    font-weight:500;
    color:#555;
    padding:6px 12px;
    border-radius:8px;
    background:#f5f5f5;
    border:1px solid #ddd;
    cursor:pointer;
    transition:0.2s;
}
.logout-btn:hover {
    background:#667eea;
    color:white;
    border-color:#667eea;
}
        /* ===== FOOTER ===== */
        .footer{
            height:48px;
            background:rgba(255,255,255,.95);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:13px;
            color:#555;
        }

    </style>

</head>

<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">

    <div class="nav-left">
        <div class="logo">HabitIQ</div>

        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}" class="active">Habits</a>
        <a th:href="@{/api/v1/settings}" class="table-icon" style="padding:6px 10px;">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">
        <a th:href="@{/api/v1/progress}">Progress</a>

        <!-- Circular profile image linking to profile page -->
        <a th:href="@{/api/v1/profile}" class="profile-circle">
            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile">
            <span th:if="${profile == null or profile.profileImage == null}"
                  style="font-size:16px;">👤</span>
        </a>
        <!-- Logout button -->
        <form th:action="@{/api/v1/auth/logout}" method="get" style="margin-left:8px;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="onboarding-wrapper">

    <div class="container">

        <div class="progress-bar" id="progressBar"></div>
        <span id="stepText">Step 1 of 7</span>

        <!-- ===== FORM ===== -->
        <form th:action="@{/api/v1/habits/add}" th:object="${habit}" method="post" id="habitForm">
            <input type="hidden" th:field="*{habitName}" id="habitNameField">
            <input type="hidden" th:field="*{categoryEnum}" id="categoryField">
            <input type="hidden" th:field="*{frequencyEnum}" id="frequencyField">
            <input type="hidden" th:field="*{preferredTimeOfDayEnum}" id="timeField">
            <input type="hidden" th:field="*{effortLevelEnum}" id="effortField">
            <input type="hidden" th:field="*{purpose}" id="purposeField">
            <input type="hidden" th:field="*{statusEnum}" id="statusField">
        </form>

        <!-- ===== SCREEN 1 ===== -->
        <div class="screen active">
            <h2>Name Your Habit</h2>
            <input type="text" id="habitNameInput" placeholder="Morning Exercise">
            <button onclick="saveHabitName()">Next</button>
        </div>

        <!-- ===== SCREEN 2 ===== -->
        <div class="screen">
            <h2>Category</h2>
            <div class="grid">
                <div class="card"
                     th:each="c : ${categories}"
                     th:text="${c}"
                     th:attr="data-category=${c}"></div>
            </div>
            <button onclick="nextScreen()">Next</button>
        </div>

        <!-- ===== SCREEN 3 ===== -->
        <div class="screen">
            <h2>Frequency</h2>
            <div class="grid single">
                <div class="card"
                     th:each="f : ${frequencies}"
                     th:text="${f}"
                     th:attr="data-frequency=${f}"></div>
            </div>
            <button onclick="nextScreen()">Next</button>
        </div>

        <!-- ===== SCREEN 4 ===== -->
        <div class="screen">
            <h2>Preferred Time</h2>
            <div class="grid single">
                <div class="card"
                     th:each="t : ${times}"
                     th:text="${t}"
                     th:attr="data-time=${t}"></div>
            </div>
            <button onclick="nextScreen()">Next</button>
        </div>

        <!-- ===== SCREEN 5 ===== -->
        <div class="screen">
            <h2>Effort Level</h2>
            <div class="grid single">
                <div class="card"
                     th:each="e : ${efforts}"
                     th:text="${e}"
                     th:attr="data-effort=${e}"></div>
            </div>
            <button onclick="nextScreen()">Next</button>
        </div>

        <!-- ===== SCREEN 6 ===== -->
        <div class="screen">
            <h2>Purpose</h2>
            <textarea id="purposeInput" placeholder="Why do you want this habit?"></textarea>
            <button onclick="savePurpose()">Next</button>
        </div>

        <!-- ===== SCREEN 7 ===== -->
        <div class="screen">
            <h2>Status</h2>
            <div class="grid single">
                <div class="card"
                     th:each="s : ${statuses}"
                     th:text="${s}"
                     th:attr="data-status=${s}"></div>
            </div>
            <button onclick="submitHabit()">Finish</button>
        </div>

    </div>

</main>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script>
    const screens=document.querySelectorAll(".screen");
    const progressBar=document.getElementById("progressBar");
    const stepText=document.getElementById("stepText");
    let step=0;

    function updateUI(){
        screens.forEach(s=>s.classList.remove("active"));
        screens[step].classList.add("active");
        progressBar.style.width=`${((step+1)/7)*100}%`;
        stepText.innerText=`Step ${step+1} of 7`;
    }

    function nextScreen(){ step++; updateUI(); }
    function saveHabitName(){
        document.getElementById("habitNameField").value = document.getElementById("habitNameInput").value;
        nextScreen();
    }
    function savePurpose(){
        document.getElementById("purposeField").value = document.getElementById("purposeInput").value;
        nextScreen();
    }

    function selectSingle(card,selector){
        document.querySelectorAll(selector).forEach(c=>c.classList.remove("selected"));
        card.classList.add("selected");
    }

    document.querySelectorAll("[data-category]").forEach(c=>{
        c.onclick=()=>{ selectSingle(c,"[data-category]"); document.getElementById("categoryField").value=c.dataset.category; }
    });
    document.querySelectorAll("[data-frequency]").forEach(c=>{
        c.onclick=()=>{ selectSingle(c,"[data-frequency]"); document.getElementById("frequencyField").value=c.dataset.frequency; }
    });
    document.querySelectorAll("[data-time]").forEach(c=>{
        c.onclick=()=>{ selectSingle(c,"[data-time]"); document.getElementById("timeField").value=c.dataset.time; }
    });
    document.querySelectorAll("[data-effort]").forEach(c=>{
        c.onclick=()=>{ selectSingle(c,"[data-effort]"); document.getElementById("effortField").value=c.dataset.effort; }
    });
    document.querySelectorAll("[data-status]").forEach(c=>{
        c.onclick=()=>{ selectSingle(c,"[data-status]"); document.getElementById("statusField").value=c.dataset.status; }
    });

    function submitHabit(){ document.getElementById("habitForm").submit(); }
</script>

</body>
</html>
