<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Habit Table</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,system-ui,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .navbar{
            height:56px;
            background:rgba(255,255,255,0.95);
            padding:0 24px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            box-shadow:0 8px 24px rgba(0,0,0,.1);
        }

        .logo{
            font-size:20px;
            font-weight:700;
            color:#667eea;
        }

        .nav-left,
        .nav-center,
        .nav-right{
            display:flex;
            align-items:center;
            gap:18px;
            list-style:none;
        }

        .nav-left a,
        .nav-right a{
            text-decoration:none;
            color:#555;
            font-size:14px;
            font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
            color:#667eea;
        }

        .table-icon{
            font-size:18px;
            background:#667eea;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            text-decoration:none;
        }

        .profile-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logout-btn {
            font-size:14px;
            font-weight:500;
            color:#555;
            padding:6px 12px;
            border-radius:8px;
            background:#f5f5f5;
            border:1px solid #ddd;
            cursor:pointer;
            transition:0.2s;
        }

        .logout-btn:hover {
            background:#667eea;
            color:white;
            border-color:#667eea;
        }

        .content{
            flex:1;
            padding:20px;
        }

        .table-container{
            background:#fff;
            border-radius:12px;
            padding:16px;
            box-shadow:0 14px 30px rgba(0,0,0,.15);
        }

        .table th{
            background:#212529;
            color:white;
            text-align:center;
        }

        .table td{
            text-align:center;
            vertical-align:middle;
        }

        .status-active{
            background:#22c55e;
            color:white;
            padding:5px 10px;
            border-radius:20px;
            font-size:12px;
        }

        .status-paused{
            background:#f59e0b;
            color:white;
            padding:5px 10px;
            border-radius:20px;
            font-size:12px;
        }

        .status-archived{
            background:#ef4444;
            color:white;
            padding:5px 10px;
            border-radius:20px;
            font-size:12px;
        }

        .action-btns{
            display:flex;
            justify-content:center;
            gap:5px;
        }

        .footer{
            height:48px;
            background:rgba(255,255,255,0.95);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:13px;
            color:#555;
            box-shadow:0 -4px 16px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

<header class="navbar">

    <div class="nav-left">
        <div class="logo">HabitIQ</div>
        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}">Habits</a>
        <a th:href="@{/api/v1/settings}" class="table-icon" style="padding:6px 10px;">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">
        <a th:href="@{/api/v1/progress}">Progress</a>

        <!-- Small circular profile -->
        <a th:href="@{/api/v1/profile}" class="profile-circle">
            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile" />
            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">👤</span>
        </a>

        <!-- Logout button -->
        <form th:action="@{/api/v1/auth/logout}" method="get" style="margin-left:8px;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>

    </div>

</header>

<div class="content">

    <div class="table-container">

        <h4 class="mb-3">📋 Habit Table</h4>

        <table class="table table-striped table-hover table-bordered">

            <thead>

            <tr>
                <th>ID</th>
                <th>Habit Name</th>
                <th>Category</th>
                <th>Frequency</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="habit : ${habits}">

                <td th:text="${habit.habitId}"></td>

                <td>
                    <a th:href="@{/api/v1/habits/view/{id}(id=${habit.habitId})}"
                       th:text="${habit.habitName}"
                       style="text-decoration:none;font-weight:600;color:#667eea;">
                    </a>
                </td>

                <td th:text="${habit.categoryEnum}"></td>

                <td th:text="${habit.frequencyEnum}"></td>

                <td>
                    <span th:if="${habit.statusEnum.name()=='Active'}" class="status-active">Active</span>
                    <span th:if="${habit.statusEnum.name()=='Paused'}" class="status-paused">Paused</span>
                    <span th:if="${habit.statusEnum.name()=='Archived'}" class="status-archived">Archived</span>
                </td>

                <td th:text="${#temporals.format(habit.createdAt,'yyyy-MM-dd HH:mm')}"></td>

                <td>
                    <div class="action-btns">
                        <!-- Existing buttons -->
                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Active"/>
                            <button class="btn btn-sm btn-success">Active</button>
                        </form>
                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Paused"/>
                            <button class="btn btn-sm btn-warning">Pause</button>
                        </form>
                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Archived"/>
                            <button class="btn btn-sm btn-danger">Archive</button>
                        </form>

                        <!-- DELETE button -->
                        <form th:action="@{/api/v1/habits/delete/{id}(id=${habit.habitId})}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this habit permanently?');">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </div>                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(habits)}">
                <td colspan="7" style="text-align:center;padding:20px;color:#777;">
                    🎉 No habits yet — create your first habit!
                </td>
            </tr>

            </tbody>

        </table>

        <nav th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage==0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/api/v1/habits/table(pageNo=${currentPage-1},size=${size})}">
                        Previous
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                    th:classappend="${currentPage==i}? 'active'">
                    <a class="page-link"
                       th:href="@{/api/v1/habits/table(pageNo=${i},size=${size})}"
                       th:text="${i+1}"></a>
                </li>
                <li class="page-item"
                    th:classappend="${currentPage==totalPages-1}? 'disabled'">
                    <a class="page-link"
                       th:href="@{/api/v1/habits/table(pageNo=${currentPage+1},size=${size})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>

    </div>

</div>

<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

</body>
</html>
