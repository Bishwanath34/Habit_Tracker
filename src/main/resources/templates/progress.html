<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Progress</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,system-ui,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        /* NAVBAR */

        .navbar{
            height:56px;
            background:rgba(255,255,255,0.95);
            padding:0 24px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 8px 24px rgba(0,0,0,.1);
            flex-shrink:0;
        }

        .nav-left,
        .nav-center,
        .nav-right{
            display:flex;
            align-items:center;
            gap:18px;
        }

        .nav-left a,
        .nav-right a{
            text-decoration:none;
            font-size:14px;
            color:#555;
            font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
            color:#667eea;
        }

        .nav-left a.active,
        .nav-right a.active{
            color:#667eea;
            font-weight:600;
        }

        .table-icon{
            font-size:18px;
            background:#667eea;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            text-decoration:none;
        }

        .table-icon:hover{
            transform:scale(1.1);
            transition:0.2s;
        }

        .logo{
            font-size:20px;
            font-weight:700;
            color:#667eea;
        }

        .profile-circle {
            width:36px;
            height:36px;
            border-radius:50%;
            overflow:hidden;
            border:2px solid #667eea;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .profile-circle img {
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        /* MAIN */

        .page-wrapper{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:10px;
        }

        /* CARD */

        .card{
            width:100%;
            max-width:900px;
            background:white;
            border-radius:16px;
            padding:16px;
            box-shadow:0 14px 28px rgba(0,0,0,.15);
        }

        /* HEADER ROW */

        .header-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }

        .tabs{
            display:flex;
            gap:6px;
        }

        .tab{
            padding:4px 10px;
            border-radius:10px;
            border:1px solid #ddd;
            background:#f5f6ff;
            font-size:12px;
            cursor:pointer;
        }

        .tab.active{
            background:linear-gradient(to right,#667eea,#764ba2);
            color:white;
            border:none;
        }

        /* STREAK */

        .streaks{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin-bottom:12px;
        }

        .streak-card{
            background:#f9f9ff;
            border-radius:10px;
            padding:10px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        .streak-value{
            font-size:20px;
            font-weight:700;
            color:#667eea;
        }

        /* PROGRESS */

        .progress-item{
            margin-bottom:6px;
        }

        .progress-label{
            font-size:12px;
            margin-bottom:2px;
        }

        .progress-bar{
            width:100%;
            background:#eee;
            height:8px;
            border-radius:8px;
            overflow:hidden;
        }

        .progress-fill{
            height:8px;
            background:linear-gradient(to right,#667eea,#764ba2);
        }

        /* CHART */

        .chart-container{
            height:150px;
            margin-bottom:10px;
        }

        /* HEATMAP */

        .heatmap{
            display:grid;
            grid-template-columns:repeat(14,1fr);
            gap:3px;
            margin-bottom:10px;
        }

        .heat{
            width:10px;
            height:10px;
            background:#eee;
            border-radius:2px;
        }

        .level1{background:#c6d6ff}
        .level2{background:#91a9ff}
        .level3{background:#667eea}
        .level4{background:#3f51b5}

        /* REMINDERS */

        .reminders{
            background:#f5f6ff;
            border-radius:10px;
            padding:8px;
        }

        .reminders h4{
            margin-bottom:4px;
            font-size:13px;
        }

        .reminders li{
            font-size:12px;
        }

        /* INSIGHT */

        .insight{
            margin-top:8px;
            background:#eef0ff;
            border-left:4px solid #667eea;
            padding:6px;
            font-size:12px;
            border-radius:6px;
        }
.logout-btn {
    font-size:14px;
    font-weight:500;
    color:#555;
    padding:6px 12px;
    border-radius:8px;
    background:#f5f5f5;
    border:1px solid #ddd;
    cursor:pointer;
    transition:0.2s;
}
.logout-btn:hover {
    background:#667eea;
    color:white;
    border-color:#667eea;
}
        /* FOOTER */

        .footer{
            height:48px;
            background:rgba(255,255,255,0.95);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:13px;
            color:#555;
            box-shadow:0 -4px 16px rgba(0,0,0,.1);
            flex-shrink:0;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

    <div class="nav-left">
        <div class="logo">HabitIQ</div>
        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}">Habits</a>
        <a th:href="@{/api/v1/settings}" class="table-icon" style="padding:6px 10px;">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">
        <a th:href="@{/api/v1/progress}" class="active">Progress</a>

        <!-- Small circular profile -->
        <a th:href="@{/api/v1/profile}" class="profile-circle">
            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile" />
            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">👤</span>
        </a>
        <!-- Logout button -->
        <form th:action="@{/api/v1/auth/logout}" method="get" style="margin-left:8px;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

</header>

<!-- MAIN -->

<main class="page-wrapper">

    <section class="card">

        <div class="header-row">
            <h3>📈 Progress</h3>

            <div class="tabs">
                <button class="tab active" data-range="weekly">Weekly</button>
                <button class="tab" data-range="monthly">Monthly</button>
            </div>
        </div>

        <!-- STREAKS -->

        <div class="streaks">

            <div class="streak-card">
                <h5>🔥 Current</h5>
                <p class="streak-value" th:text="${currentStreak}">0</p>
            </div>

            <div class="streak-card">
                <h5>🏆 Best</h5>
                <p class="streak-value" th:text="${longestStreak}">0</p>
            </div>

            <div class="streak-card">
                <h5>📊 Habits</h5>
                <p class="streak-value" th:text="${#lists.size(habits)}">0</p>
            </div>

        </div>

        <!-- HABIT PROGRESS -->

        <div th:each="habit : ${habits}" class="progress-item">

            <div class="progress-label" th:text="${habit.habitName}"></div>

            <div class="progress-bar">
                <div class="progress-fill"
                     th:style="'width:' + (${habit.currentStreak} > 100 ? 100 : habit.currentStreak) + '%'">
                </div>
            </div>

        </div>

        <!-- CHART -->

        <div class="chart-container">
            <canvas id="consistencyChart"></canvas>
        </div>

        <!-- HEATMAP -->

        <div class="heatmap" id="heatmap"></div>

        <!-- REMINDERS -->

        <div class="reminders">
            <h4>🔔 Reminders</h4>

            <ul>
                <li th:each="habit : ${habits}">
                    <span th:text="${habit.habitName}"></span>
                </li>
            </ul>

        </div>

        <!-- INSIGHT -->

        <div class="insight">
            💡 You have completed
            <span th:text="${#lists.size(logs)}"></span>
            habit actions recently. Keep going!
        </div>

    </section>

</main>

<!-- FOOTER -->

<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<script th:inline="javascript">
    // Chart.js line chart
    const weeklyStats = [[${weeklyStats}]];
    const monthlyStats = [[${monthlyStats}]];
    let currentRange = /*[[${selectedRange}]]*/ 'weekly';

    function renderChart(range) {
        const stats = range === 'monthly' ? monthlyStats : weeklyStats;
        const labels = stats.map(item => item[0]);
        const data = stats.map(item => item[1]);

        const ctx = document.getElementById("consistencyChart");
        if (window.chartInstance) window.chartInstance.destroy();

        window.chartInstance = new Chart(ctx, {
            type: "line",
            data: { labels, datasets: [{ data, borderColor: "#667eea", backgroundColor: "rgba(102,126,234,0.2)", fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true}} }
        });
    }
    renderChart(currentRange);
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentRange = tab.dataset.range;
            renderChart(currentRange);
        });
    });

    // Heatmap
    const streakData = [[${streakData}]];
    const heatmap = document.getElementById('heatmap');
    streakData.forEach(level => {
        const div = document.createElement('div');
        div.classList.add('heat');
        if(level === 1) div.classList.add('level1');
        else if(level === 2) div.classList.add('level2');
        else if(level === 3) div.classList.add('level3');
        else if(level === 4) div.classList.add('level4');
        heatmap.appendChild(div);
    });
</script></body>
</html>
