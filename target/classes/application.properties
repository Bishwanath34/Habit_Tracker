# ==============================
# Application
# ==============================
spring.application.name=habitiq

server.port=${PORT:8080}


spring.datasource.url=jdbc:mysql://habitiq-db.c90yguk6y9qa.ap-south-1.rds.amazonaws.com:3306/habitiq
spring.datasource.username=admin
spring.datasource.password=Bishwanath123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate can auto-detect MySQL dialect, no need to set explicitly

# ==============================
# SMTP (Gmail)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}          # Replace with your Gmail or use env variable
spring.mail.password=${MAIL_PASSWORD}          # Replace with app password or use env variable
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==============================
# Optional: HikariCP Settings for connection pooling
# ==============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
