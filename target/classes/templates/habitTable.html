<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Habit Table</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        /* ===== GLOBAL ===== */

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Inter,system-ui,sans-serif;
        }

        body{
        height:100vh;
        display:flex;
        flex-direction:column;
        background:linear-gradient(135deg,#667eea,#764ba2);
        }

        /* ===== NAVBAR (EXACT SAME AS DASHBOARD) ===== */

        .navbar{
        height:56px;
        background:rgba(255,255,255,0.95);
        padding:0 24px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        box-shadow:0 8px 24px rgba(0,0,0,.1);
        }

        .logo{
        font-size:20px;
        font-weight:700;
        color:#667eea;
        }

        .nav-left,
        .nav-center,
        .nav-right{
        display:flex;
        align-items:center;
        gap:18px;
        }

        .nav-left a,
        .nav-right a{
        text-decoration:none;
        color:#555;
        font-size:14px;
        font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
        color:#667eea;
        }

        .nav-left a.active{
        color:#667eea;
        font-weight:600;
        }

        .table-icon{
        font-size:18px;
        background:#667eea;
        color:white;
        padding:6px 12px;
        border-radius:8px;
        text-decoration:none;
        }

        .table-icon:hover{
        transform:scale(1.1);
        transition:0.2s;
        }

        /* PROFILE */

        .profile-circle{
        width:36px;
        height:36px;
        border-radius:50%;
        overflow:hidden;
        border:2px solid #667eea;
        cursor:pointer;
        }

        .profile-circle img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        }

        /* LOGOUT */

        .logout-btn{
        font-size:14px;
        font-weight:500;
        color:#555;
        padding:6px 12px;
        border-radius:8px;
        background:#f5f5f5;
        border:1px solid #ddd;
        cursor:pointer;
        transition:0.2s;
        }

        .logout-btn:hover{
        background:#667eea;
        color:white;
        border-color:#667eea;
        }

        /* ===== CONTENT ===== */

        .content{
        flex:1;
        padding:20px;
        max-width:1100px;
        margin:auto;
        width:100%;
        }

        /* ===== TABLE CARD ===== */

        .table-container{
        background:#fff;
        border-radius:16px;
        padding:20px;
        box-shadow:0 14px 30px rgba(0,0,0,.15);
        }

        /* TABLE */

        .table th{
        background:#212529;
        color:white;
        text-align:center;
        }

        .table td{
        text-align:center;
        vertical-align:middle;
        }

        /* STATUS */

        .status-active{
        background:#22c55e;
        color:white;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
        }

        .status-paused{
        background:#f59e0b;
        color:white;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
        }

        .status-archived{
        background:#ef4444;
        color:white;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
        }

        /* ACTION BUTTONS */

        .action-btns{
        display:flex;
        justify-content:center;
        gap:5px;
        }

        /* ===== FOOTER ===== */

        .footer{
        height:48px;
        background:rgba(255,255,255,0.95);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        color:#555;
        }

        /* ===== DARK MODE ===== */

        body.dark-mode{
        background:#1e1e2f;
        color:#f0f0f0;
        }

        body.dark-mode .navbar,
        body.dark-mode .footer{
        background:rgba(40,40,40,0.95);
        color:#f0f0f0;
        box-shadow:0 8px 24px rgba(0,0,0,.3);
        }

        body.dark-mode .nav-left a,
        body.dark-mode .nav-right a{
        color:#ddd;
        }

        body.dark-mode .nav-left a:hover,
        body.dark-mode .nav-right a:hover,
        body.dark-mode .nav-left a.active{
        color:#88f;
        }

        body.dark-mode .table-container{
        background:#2c2c3f;
        color:#f0f0f0;
        }

        #darkToggle:hover{
        transform:scale(1.2);
        transition:0.2s;
        }

    </style>
</head>

<body>

<!-- ===== NAVBAR ===== -->

<header class="navbar">

    <div class="nav-left">
        <div class="logo">HabitIQ</div>

        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}">Habits</a>

        <a th:href="@{/api/v1/settings}" class="table-icon" style="padding:6px 10px;">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">

        <button id="darkToggle" style="border:none;background:none;font-size:18px;cursor:pointer;">
            🌙
        </button>

        <a th:href="@{/api/v1/progress}">Progress</a>

        <a th:href="@{/api/v1/profile}" class="profile-circle">

            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile"/>

            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">
👤
</span>

        </a>

        <form th:action="@{/api/v1/auth/logout}" method="get">
            <button type="submit" class="logout-btn">Logout</button>
        </form>

    </div>

</header>

<!-- ===== CONTENT ===== -->

<div class="content">

    <div class="table-container">

        <h4 class="mb-3">📋 Habit Table</h4>

        <table class="table table-striped table-hover table-bordered">

            <thead>

            <tr>
                <th>ID</th>
                <th>Habit Name</th>
                <th>Category</th>
                <th>Frequency</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="habit : ${habits}">

                <td th:text="${habit.habitId}"></td>

                <td>
                    <a th:href="@{/api/v1/habits/view/{id}(id=${habit.habitId})}"
                       th:text="${habit.habitName}"
                       style="text-decoration:none;font-weight:600;color:#667eea;">
                    </a>
                </td>

                <td th:text="${habit.categoryEnum}"></td>

                <td th:text="${habit.frequencyEnum}"></td>

                <td>

                    <span th:if="${habit.statusEnum.name()=='Active'}" class="status-active">Active</span>
                    <span th:if="${habit.statusEnum.name()=='Paused'}" class="status-paused">Paused</span>
                    <span th:if="${habit.statusEnum.name()=='Archived'}" class="status-archived">Archived</span>

                </td>

                <td th:text="${#temporals.format(habit.createdAt,'yyyy-MM-dd HH:mm')}"></td>

                <td>

                    <div class="action-btns">

                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Active"/>
                            <button class="btn btn-sm btn-success">Active</button>
                        </form>

                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Paused"/>
                            <button class="btn btn-sm btn-warning">Pause</button>
                        </form>

                        <form th:action="@{/api/v1/habits/status/{id}(id=${habit.habitId})}" method="post">
                            <input type="hidden" name="status" value="Archived"/>
                            <button class="btn btn-sm btn-danger">Archive</button>
                        </form>

                        <form th:action="@{/api/v1/habits/delete/{id}(id=${habit.habitId})}" method="post"
                              onsubmit="return confirm('Delete this habit permanently?');">

                            <button class="btn btn-sm btn-outline-danger">
                                <i class="fa-solid fa-trash"></i>
                            </button>

                        </form>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<script>

    const toggleBtn=document.getElementById("darkToggle");

    if(localStorage.getItem("darkMode")==="enabled"){
    document.body.classList.add("dark-mode");
    toggleBtn.textContent="☀️";
    }

    toggleBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
    localStorage.setItem("darkMode","enabled");
    toggleBtn.textContent="☀️";
    }else{
    localStorage.setItem("darkMode","disabled");
    toggleBtn.textContent="🌙";
    }

    });

</script>

</body>
</html>
