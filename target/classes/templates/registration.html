<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HabitIQ – Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        background:linear-gradient(135deg,#667eea,#764ba2);
        font-family:"Inter",system-ui,sans-serif;
        margin:0;
        color:#333;
        }

        /* ===== NAVBAR ===== */

        .navbar{
        height:56px;
        background:rgba(255,255,255,0.95);
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 24px;
        box-shadow:0 8px 24px rgba(0,0,0,0.1);
        }

        .logo{
        font-size:20px;
        font-weight:700;
        color:#667eea;
        }

        .dark-btn{
        border:none;
        background:none;
        font-size:18px;
        cursor:pointer;
        }

        /* ===== REGISTER CARD ===== */

        .card{
        border-radius:16px;
        max-width:420px;
        width:100%;
        padding:2rem;
        background:white;
        box-shadow:0 14px 28px rgba(0,0,0,0.15);
        text-align:center;
        }

        .form-control{
        border-radius:8px;
        height:44px;
        }

        .btn-primary{
        background:linear-gradient(135deg,#667eea,#764ba2);
        border:none;
        }

        .btn-primary:hover{
        background:linear-gradient(135deg,#5a67d8,#5a4ba2);
        }

        .text-danger{
        font-size:13px;
        }

        /* ===== FOOTER ===== */

        .footer{
        height:48px;
        background:rgba(255,255,255,0.95);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        color:#555;
        box-shadow:0 -4px 16px rgba(0,0,0,0.1);
        }

        /* ===== DARK MODE ===== */

        body.dark-mode{
        background:#1e1e2f;
        color:#f0f0f0;
        }

        body.dark-mode .navbar{
        background:rgba(40,40,40,0.95);
        box-shadow:0 8px 24px rgba(0,0,0,.3);
        }

        body.dark-mode .footer{
        background:rgba(40,40,40,0.95);
        color:#ddd;
        }

        body.dark-mode .card{
        background:#2c2c3f;
        color:#f0f0f0;
        box-shadow:0 14px 30px rgba(0,0,0,.5);
        }

        body.dark-mode .form-control{
        background:#3c3c50;
        border-color:#555;
        color:white;
        }

        body.dark-mode .form-control::placeholder{
        color:#bbb;
        }

        body.dark-mode .input-group-text{
        background:#3c3c50;
        border-color:#555;
        color:white;
        }

        body.dark-mode a{
        color:#88aaff;
        }

        #darkToggle:hover{
        transform:scale(1.2);
        transition:0.2s;
        }

    </style>

</head>

<body>

<!-- ===== HEADER ===== -->

<header class="navbar">

    <div class="logo">HabitIQ</div>

    <button id="darkToggle" class="dark-btn">🌙</button>

</header>

<!-- ===== REGISTER SECTION ===== -->

<div class="d-flex align-items-center justify-content-center flex-grow-1 p-3">

    <div class="card">

        <h3 class="fw-bold mb-3">Create Account</h3>

        <p class="text-muted mb-4">Sign up to start tracking your habits.</p>

        <form th:action="@{/api/v1/auth/register}" method="post" th:object="${user}">

            <input type="text"
                   class="form-control mb-3"
                   placeholder="Name"
                   th:field="*{name}"
                   required>

            <input type="email"
                   class="form-control mb-3"
                   placeholder="Email"
                   th:field="*{email}"
                   required>

            <div class="input-group mb-3">

                <input type="password"
                       class="form-control"
                       placeholder="Password"
                       th:field="*{password}"
                       id="passwordInput"
                       required>

                <span class="input-group-text"
                      id="togglePassword"
                      style="cursor:pointer;">

<i class="fa fa-eye"></i>

</span>

            </div>

            <p class="text-danger fw-semibold"
               th:text="${error}"
               th:if="${error}"></p>

            <button type="submit"
                    class="btn btn-primary w-100 py-2 mt-3">

                Register

            </button>

        </form>

        <p class="small mt-3">

            Already have an account?

            <a th:href="@{/api/v1/auth/loginForm}">
                Login here
            </a>

        </p>

    </div>

</div>

<!-- ===== FOOTER ===== -->

<footer class="footer">

    HabitIQ © 2025 — Created by Bishwanath Kumam

</footer>

<script>

    /* PASSWORD SHOW HIDE */

    const togglePassword=document.getElementById("togglePassword");
    const passwordInput=document.getElementById("passwordInput");

    togglePassword.addEventListener("click",function(){

    const type=passwordInput.getAttribute("type")==="password"?"text":"password";

    passwordInput.setAttribute("type",type);

    this.querySelector("i").classList.toggle("fa-eye");

    this.querySelector("i").classList.toggle("fa-eye-slash");

    });


    /* DARK MODE */

    const toggleBtn=document.getElementById("darkToggle");

    if(localStorage.getItem("darkMode")==="enabled"){

    document.body.classList.add("dark-mode");
    toggleBtn.textContent="☀️";

    }

    toggleBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

    localStorage.setItem("darkMode","enabled");
    toggleBtn.textContent="☀️";

    }else{

    localStorage.setItem("darkMode","disabled");
    toggleBtn.textContent="🌙";

    }

    });

</script>

</body>
</html>
