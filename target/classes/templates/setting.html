<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Reminder Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ===== GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: #333;
            transition: all 0.3s ease;
        }

        /* ===== DARK MODE ===== */
        body.dark-mode {
            background: #1e1e2f;
            color: #f0f0f0;
        }

        body.dark-mode .navbar,
        body.dark-mode .footer {
            background: rgba(40, 40, 40, 0.95);
            color: #f0f0f0;
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
        }

        body.dark-mode .nav-left a,
        body.dark-mode .nav-right a {
            color: #ddd;
        }

        body.dark-mode .nav-left a:hover,
        body.dark-mode .nav-right a:hover,
        body.dark-mode .nav-left a.active,
        body.dark-mode .nav-right a.active {
            color: #88f;
        }

        body.dark-mode .card {
            background: #2c2c3f;
            color: #f0f0f0;
            box-shadow: 0 14px 28px rgba(0,0,0,.5);
        }

        body.dark-mode select,
        body.dark-mode input[type=checkbox] {
            background: #444;
            color: #f0f0f0;
            border: 1px solid #666;
        }

        body.dark-mode button {
            background: linear-gradient(135deg,#4444aa,#8855cc);
            color: #f0f0f0;
        }

        body.dark-mode .dark-mode-toggle {
            color: #f0f0f0;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            height: 56px;
            background: rgba(255,255,255,0.95);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .nav-left, .nav-center, .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            font-size: 14px;
            color: #555;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-left a:hover, .nav-right a:hover {
            color: #667eea;
        }

        .nav-left a.active, .nav-right a.active {
            color: #667eea;
            font-weight: 600;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .table-icon {
            font-size: 18px;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.2s;
        }

        .table-icon:hover {
            transform: scale(1.1);
        }

        .profile-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logout-btn {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            padding: 6px 12px;
            border-radius: 8px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* ===== MAIN ===== */
        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 14px 28px rgba(0,0,0,.15);
            transition: all 0.3s ease;
        }

        h3 {
            margin-bottom: 20px;
            color: inherit;
        }

        label {
            font-size: 14px;
            font-weight: 500;
        }

        select, input[type=checkbox] {
            margin-top: 6px;
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        /* ===== FOOTER ===== */
        .footer {
            height: 48px;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #555;
            box-shadow: 0 -4px 16px rgba(0,0,0,.1);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .form-group {
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="nav-left">
        <div class="logo">HabitIQ</div>
        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>
        <a th:href="@{/api/v1/habits/}">Habits</a>
        <a th:href="@{/api/v1/settings}" class="table-icon" style="padding:6px 10px;">⚙️</a>
    </div>

    <div class="nav-center">
        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>
    </div>

    <div class="nav-right">


        <a th:href="@{/api/v1/progress}">Progress</a>

        <a th:href="@{/api/v1/profile}" class="profile-circle">
            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile" />
            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">👤</span>
        </a>

        <form th:action="@{/api/v1/auth/logout}" method="get" style="margin-left:8px;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</header>

<!-- MAIN -->
<main class="page-wrapper">
    <section class="card">
        <h3>Reminder Settings</h3>

        <form th:action="@{/api/v1/settings}" method="post">
            <div class="form-group">
                <label>Frequency:</label>
                <select name="frequency" class="form-select">
                    <option th:each="freq : ${frequencies}"
                            th:value="${freq}"
                            th:text="${freq}"
                            th:selected="${freq == setting.frequency}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Preferred Time:</label>
                <select name="preferredTime" class="form-select">
                    <option th:each="time : ${timesOfDay}"
                            th:value="${time}"
                            th:text="${time}"
                            th:selected="${time == setting.preferredTime}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Enable Reminders:</label>
                <input type="checkbox" name="enabled" th:checked="${setting.enabled}"/>
            </div>

            <button type="submit">Save Settings</button>
        </form>
    </section>
</main>

<!-- FOOTER -->
<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<script>
    const toggle = document.getElementById('darkModeToggle');
    const body = document.body;

    // Initialize dark mode from localStorage
    if(localStorage.getItem('darkMode') === 'true'){
        body.classList.add('dark-mode');
        toggle.classList.replace('fa-moon', 'fa-sun');
    }

    toggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        const enabled = body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', enabled);
        toggle.classList.toggle('fa-moon');
        toggle.classList.toggle('fa-sun');
    });
</script>
</body>
</html>
