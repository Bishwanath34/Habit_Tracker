<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HabitIQ – Reminder Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* ===== GLOBAL ===== */

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Inter,system-ui,sans-serif;
        }

        body{
        display:flex;
        flex-direction:column;
        min-height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:#333;
        transition:all .3s ease;
        }

        /* ===== DARK MODE ===== */

        body.dark-mode{
        background:#1e1e2f;
        color:#f0f0f0;
        }

        body.dark-mode .navbar,
        body.dark-mode .footer{
        background:#2c2c3f;
        color:#f0f0f0;
        }

        /* ===== NAVBAR ===== */

        .navbar{
        height:56px;
        background:rgba(255,255,255,.95);
        padding:0 24px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        box-shadow:0 8px 24px rgba(0,0,0,.1);
        }

        .nav-left,
        .nav-center,
        .nav-right{
        display:flex;
        align-items:center;
        gap:18px;
        }

        .logo{
        font-size:20px;
        font-weight:700;
        color:#667eea;
        }

        .nav-left a,
        .nav-right a{
        text-decoration:none;
        font-size:14px;
        color:#555;
        font-weight:500;
        }

        .nav-left a:hover,
        .nav-right a:hover{
        color:#667eea;
        }

        /* ===== ICON BUTTON ===== */

        .table-icon{
        font-size:18px;
        background:#667eea;
        color:white;
        padding:6px 12px;
        border-radius:8px;
        text-decoration:none;
        }

        /* ===== PROFILE ===== */

        .profile-circle{
        width:36px;
        height:36px;
        border-radius:50%;
        overflow:hidden;
        border:2px solid #667eea;
        cursor:pointer;
        }

        .profile-circle img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        }

        /* ===== LOGOUT ===== */

        .logout-btn{
        font-size:14px;
        font-weight:500;
        color:#555;
        padding:6px 12px;
        border-radius:8px;
        background:#f5f5f5;
        border:1px solid #ddd;
        cursor:pointer;
        transition:.2s;
        }

        .logout-btn:hover{
        background:#667eea;
        color:white;
        border-color:#667eea;
        }

        /* ===== MAIN PAGE ===== */

        .page-wrapper{
        flex:1;
        display:flex;
        justify-content:center;
        align-items:flex-start;
        padding:30px;
        }

        .card{
        width:100%;
        max-width:600px;
        background:white;
        border-radius:16px;
        padding:24px;
        box-shadow:0 14px 28px rgba(0,0,0,.15);
        }

        h3{
        margin-bottom:20px;
        }

        .form-group{
        margin-bottom:16px;
        }

        button.save-btn{
        margin-top:20px;
        padding:8px 16px;
        font-size:14px;
        font-weight:600;
        border-radius:8px;
        border:none;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;
        cursor:pointer;
        }

        /* ===== FOOTER ===== */

        .footer{
        height:48px;
        background:rgba(255,255,255,.95);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        color:#555;
        box-shadow:0 -4px 16px rgba(0,0,0,.1);
        }

    </style>
</head>

<body>

<!-- ===== NAVBAR ===== -->

<header class="navbar">

    <div class="nav-left">

        <div class="logo">HabitIQ</div>

        <a th:href="@{/api/v1/habits/dashboard}">Dashboard</a>

        <a th:href="@{/api/v1/habits/}">Habits</a>

        <a th:href="@{/api/v1/settings}" class="table-icon">⚙️</a>

    </div>

    <div class="nav-center">

        <a th:href="@{/api/v1/habits/table}" class="table-icon">📋</a>

    </div>

    <div class="nav-right">

        <button id="darkModeToggle"
                style="border:none;background:none;font-size:18px;cursor:pointer;">
            🌙
        </button>

        <a th:href="@{/api/v1/progress}">Progress</a>

        <a th:href="@{/api/v1/profile}" class="profile-circle">

            <img th:if="${profile != null and profile.profileImage != null}"
                 th:src="@{/api/v1/profile/image}" alt="Profile"/>

            <span th:if="${profile == null or profile.profileImage == null}"
                  style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#e0e0e0;color:#9e9e9e;font-size:16px;">
👤
</span>

        </a>

        <form th:action="@{/api/v1/auth/logout}" method="get">

            <button type="submit" class="logout-btn">Logout</button>

        </form>

    </div>

</header>

<!-- ===== MAIN ===== -->

<main class="page-wrapper">

    <section class="card">

        <h3>Reminder Settings</h3>

        <form th:action="@{/api/v1/settings}" method="post">

            <div class="form-group">

                <label>Frequency</label>

                <select name="frequency" class="form-select">

                    <option th:each="freq : ${frequencies}"
                            th:value="${freq}"
                            th:text="${freq}"
                            th:selected="${freq == setting.frequency}">
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Preferred Time</label>

                <select name="preferredTime" class="form-select">

                    <option th:each="time : ${timesOfDay}"
                            th:value="${time}"
                            th:text="${time}"
                            th:selected="${time == setting.preferredTime}">
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Enable Reminders</label>

                <input type="checkbox"
                       name="enabled"
                       th:checked="${setting.enabled}">

            </div>

            <button type="submit" class="save-btn">
                Save Settings
            </button>

        </form>

    </section>

</main>

<!-- ===== FOOTER ===== -->

<footer class="footer">
    HabitIQ © 2025 — Created by Bishwanath Kumam
</footer>

<!-- ===== DARK MODE SCRIPT ===== -->

<script>

    const toggle = document.getElementById("darkModeToggle");

    if(localStorage.getItem("darkMode")==="enabled"){
    document.body.classList.add("dark-mode");
    toggle.textContent="☀️";
    }

    toggle.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
    localStorage.setItem("darkMode","enabled");
    toggle.textContent="☀️";
    }else{
    localStorage.setItem("darkMode","disabled");
    toggle.textContent="🌙";
    }

    });

</script>

</body>
</html>
